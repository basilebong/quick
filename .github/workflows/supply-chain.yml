name: Supply chain

on:
  pull_request:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: supply-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Supply-chain audit
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup

      - name: Audit known vulnerabilities (fail on moderate+)
        run: pnpm audit --audit-level=moderate

      # Requires the repo's Dependency Graph (Settings → Security & analysis).
      - name: Dependency review (PR only — fails on new vulnerable or disallowed-license deps)
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # MPL-2.0: lightningcss (Tailwind v4 CSS pipeline, stack-locked). Use unmodified at build time;
          #   MPL §3.3 explicitly allows combining unmodified MPL files into a Larger Work under any license.
          # CC-BY-4.0: caniuse-lite (browser-support dataset pulled by Babel→browserslist). Build-time data only,
          #   does not ship in production bundle; attribution preserved via the package's LICENSE file.
          # BlueOak-1.0.0: the glob/minimatch/lru-cache/jackspeak/minipass/path-scurry/@isaacs-cliui family (isaacs),
          #   pulled transitively by vite-plugin-pwa → workbox-build at BUILD time (SW generation). Blue Oak Model
          #   License 1.0.0 is OSI-approved and permissive — no copyleft, more permissive than MIT. Not in the
          #   production bundle.
          # Python-2.0: argparse (pulled by js-yaml → cosmiconfig, commitlint's config loader) at BUILD/dev time
          #   only. The Python Software Foundation License 2.0 is OSI-approved and permissive (no copyleft,
          #   GPL-compatible); commitlint is a devDependency and never ships in the production bundle.
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, CC0-1.0, Unlicense, MPL-2.0, CC-BY-4.0, BlueOak-1.0.0, Python-2.0
          # rou3 (Hono router): package.json declares "license": "MIT" and ships an MIT LICENSE file;
          #   GitHub's scanner spuriously reports "MIT AND MS-PL" — verified false-positive against upstream source.
          # @better-fetch/fetch (better-auth HTTP client): package.json missing license field, but the published
          #   tarball ships an MIT LICENSE (copyright Bereket Engida). Verified in node_modules @ 1.1.21.
          # json-schema-typed (TypeScript types for JSON Schema, pulled in transitively by
          #   @modelcontextprotocol/sdk via bunqueue): package.json declares "license": "BSD-2-Clause" and ships
          #   a pure BSD-2-Clause LICENSE.md; GitHub's scanner spuriously appends "AND JSON" — verified false-positive
          #   in node_modules @ 8.0.2. No runtime code, just .d.ts type definitions.
          # unicode-property-aliases-ecmascript + unicode-match-property-value-ecmascript: declare "license": "MIT"
          #   (Mathias Bynens) but ship Unicode data tables, so GitHub's scanner reports
          #   "LicenseRef-scancode-unicode AND MIT". The Unicode license is permissive (BSD-style). Pulled by
          #   workbox-build's Babel (preset-env) toolchain at build time; verified MIT in node_modules.
          allow-dependencies-licenses: 'pkg:npm/rou3, pkg:npm/%40better-fetch/fetch, pkg:npm/json-schema-typed, pkg:npm/unicode-property-aliases-ecmascript, pkg:npm/unicode-match-property-value-ecmascript'
